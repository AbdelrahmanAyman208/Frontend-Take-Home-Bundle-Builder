services:
  api:
    build: .
    container_name: bundle-magic-api
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/bundle-magic
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: bundle-magic-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
